# Community Scanner taxonomy — v1
# Deterministic keyword classification. No embeddings in v1 by design:
# you know this domain; a hand-built map is debuggable and honest about
# what it knows. The `uncategorized` pile is itself a signal — review it
# monthly. If it grows past ~20% of ingested threads, that's the trigger
# to evaluate embeddings for v2, not before.
#
# Matching rule (implement in classifier):
#   - case-insensitive substring match against title + body
#   - a thread matches a cluster if >= min_keyword_hits keywords match
#   - ties broken by hit count; still tied -> first cluster wins, log the tie
#   - zero matches -> cluster_id NULL (uncategorized)

config:
  min_keyword_hits: 2
  large_code_block_lines: 30        # threshold for has_large_code_block
  window_months: 12
  commercial_keywords:              # counted into commercial_hits at ingest
    - consultant
    - "quoted us"
    - quote
    - licensing cost
    - licensed
    - "hours per week"
    - "hours every"
    - partner charges
    - statement of work
    - "paid solution"
  scoring_weights:                  # composite = weighted sum, then × lane_weight
    thread_count_norm: 0.30         # normalized against max cluster in window
    unsolved_rate:     0.20
    workaround_rate:   0.20
    commercial_rate:   0.15
    store_gap_score:   0.15         # treat NULL as 0.5 (unknown), never as 1.0

lanes:
  grc:              { weight: 1.5 }
  platform_utility: { weight: 1.0 }
  itsm:             { weight: 0.3 }
  other:            { weight: 0.5 }

clusters:
  # ── GRC lane ──────────────────────────────────────────────
