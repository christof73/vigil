# Community Scanner taxonomy — v1.1
# Deterministic keyword classification. No embeddings in v1 by design.
# The `uncategorized` pile is itself a signal — review monthly; if it
# grows past ~20% of ingested threads, that triggers embeddings for v2.
#
# v1.1 changes:
#   - Full-platform cluster coverage (25 clusters, was 15 GRC-heavy)
#   - Lane weights rebalanced: weights encode PRICING POWER + COMPETITION,
#     not founder knowledge. Compressed from 1.5/0.3 because plugin-factory
#     economics (NowForge) lower per-app build cost, making lower-moat
#     swings viable.
#   - outlier_override: raw-frequency outliers surface regardless of lane
#   - Lane weights apply to app_candidate ranking ONLY. Content-candidate
#     flagging is lane-agnostic (Gotcha Journal principle is platform-wide).
#
# Matching rule (implement in classifier):
#   - case-insensitive substring match against title + body
#   - a thread matches a cluster if >= min_keyword_hits keywords match
#   - ties broken by hit count; still tied -> first cluster wins, log the tie
#   - zero matches -> cluster_id NULL (uncategorized)

config:
  min_keyword_hits: 2
  large_code_block_lines: 30
  window_months: 12
  commercial_keywords:
    - consultant
    - "quoted us"
    - quote
    - licensing cost
    - licensed
    - "hours per week"
    - "hours every"
    - partner charges
    - statement of work
    - "paid solution"
  scoring_weights:                  # composite = lane_weight × weighted sum
    thread_count_norm: 0.30
    unsolved_rate:     0.20
    workaround_rate:   0.20
    commercial_rate:   0.15
    store_gap_score:   0.15         # NULL -> 0.5 (unknown ≠ opportunity)
  outlier_override:                 # detection safety net vs. lane suppression
    metric: thread_count_x_unsolved # thread_count * unsolved_rate, raw (no lane weight)
    top_n: 3                        # top 3 by this metric ALWAYS surface in digest
  content_candidate:                # lane-agnostic — SEO value ignores portfolio fit
    min_views: 1000
    require_unsolved: true

lanes:                              # premiums reflect price points + competition, not knowledge
  grc:              { weight: 1.3 } # $500-2000/mo apps, near-zero Store competition
  secops:           { weight: 1.0 } # planned knowledge pack, moderate competition
  platform_utility: { weight: 1.0 } # $200-1000/mo apps, contestable but broad demand
  hrsd:             { weight: 0.9 } # planned knowledge pack, less founder track record
  itsm:             { weight: 0.7 } # saturated Store category; frequency must overcome
  other:            { weight: 0.6 }

